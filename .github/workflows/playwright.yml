# .github/workflows/playwright.yml
# GitHub Actions CI pipeline for Playwright + Cucumber tests
# Triggered on every push/PR + supports manual dispatch

name: QA – Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_suite:
        description: "Which suite to run"
        required: true
        default: "all"
        type: choice
        options: [all, ui, api, e2e, cucumber]

jobs:
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        # Run on multiple node versions in parallel
        node: [18, 20]

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────
      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # ── 3. Install deps ──────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Playwright browsers ───────────────────────────────────
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ── 5. Start mock API server in background ───────────────────
      - name: Start JSON-Server (mock API)
        run: npx json-server --watch test-data/db.json --port 3001 &
        env:
          API_BASE: http://localhost:3001

      # ── 6. Build + start the app ─────────────────────────────────
      - name: Build app
        run: npm run build

      - name: Start preview server
        run: npm run preview &
        env:
          BASE_URL: https://shopease-playwright.netlify.app/

      - name: Wait for servers
        run: npx wait-on http://localhost:4173 http://localhost:3001 --timeout 30000

      # ── 7. Run tests based on input ──────────────────────────────
      - name: Run UI tests
        if: ${{ github.event.inputs.test_suite == 'ui' || github.event.inputs.test_suite == 'all' || github.event_name != 'workflow_dispatch' }}
        run: npx playwright test tests/ui --reporter=html,json,junit
        env:
          BASE_URL: https://shopease-playwright.netlify.app/
          CI: true

      - name: Run API tests
        if: ${{ github.event.inputs.test_suite == 'api' || github.event.inputs.test_suite == 'all' || github.event_name != 'workflow_dispatch' }}
        run: npx playwright test tests/api
        env:
          API_BASE: http://localhost:3001
          CI: true

      - name: Run E2E tests
        if: ${{ github.event.inputs.test_suite == 'e2e' || github.event.inputs.test_suite == 'all' || github.event_name != 'workflow_dispatch' }}
        run: npx playwright test tests/e2e
        env:
          BASE_URL: https://shopease-playwright.netlify.app/
          CI: true

      - name: Run Cucumber BDD tests
        if: ${{ github.event.inputs.test_suite == 'cucumber' || github.event.inputs.test_suite == 'all' || github.event_name != 'workflow_dispatch' }}
        run: npm run test:cucumber
        env:
          BASE_URL: https://shopease-playwright.netlify.app/

      # ── 8. Generate Excel report ──────────────────────────────────
      - name: Update Excel test tracker
        if: always()
        run: node scripts/update-excel.js

      # ── 9. Upload artifacts ───────────────────────────────────────
      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-node${{ matrix.node }}
          path: reports/playwright-report/
          retention-days: 30

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-node${{ matrix.node }}
          path: screenshots/
          retention-days: 7

      - name: Upload traces
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: traces-node${{ matrix.node }}
          path: traces/
          retention-days: 7

      - name: Upload Excel tracker
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-excel-tracker-node${{ matrix.node }}
          path: reports/QA-TestCases-ShopEasy.xlsx
          retention-days: 30

      - name: Upload Cucumber report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-report-node${{ matrix.node }}
          path: reports/cucumber-report.html
          retention-days: 30

      # ── 10. Publish test results to GitHub ───────────────────────
      - name: Publish JUnit results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: reports/results.xml
          check_name: Playwright Test Results (Node ${{ matrix.node }})

  # ── Notify on failure ──────────────────────────────────────────────
  notify:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: test
    if: failure()
    steps:
      - name: Send Slack notification (failure)
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
